name: build-and-release

# v* 태그를 푸시하면 자동으로 EXE를 빌드하고 (승인 시 서명 후) 릴리스에 첨부한다.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # 수동 실행도 허용

permissions:
  contents: write       # 릴리스 생성/자산 업로드에 필요

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build EXE (onedir, UPX 미사용)
        run: python -m PyInstaller --noconfirm "oieh QR reader.spec"

      # ─── SignPath 코드 서명 (Foundation 승인 후 활성화) ───
      # SignPath 승인 후 저장소 Settings > Secrets 에 SIGNPATH_API_TOKEN 을 등록하고,
      # 아래 organization-id / project-slug / signing-policy-slug 를 본인 값으로 채우면
      # 서명이 동작합니다. 시크릿이 없으면 이 단계는 건너뛰어 빌드가 깨지지 않습니다.
      - name: Submit signing request to SignPath
        if: ${{ env.SIGNPATH_API_TOKEN != '' }}
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        uses: signpath/github-action-submit-signing-request@v1
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: 'YOUR_ORG_ID'          # TODO: SignPath 조직 ID
          project-slug: 'oieh_QR_Capture'          # TODO: SignPath 프로젝트 슬러그
          signing-policy-slug: 'release-signing'   # TODO: 서명 정책 슬러그
          artifact-configuration-slug: 'exe'       # TODO: 아티팩트 구성 슬러그
          github-artifact-id: ${{ steps.upload-unsigned.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: 'dist/oieh QR reader'

      - name: Package release zip
        shell: pwsh
        run: Compress-Archive -Path "dist/oieh QR reader" -DestinationPath "oieh-QR-reader-${{ github.ref_name }}-win64.zip" -Force

      - name: Create / update release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: "oieh-QR-reader-${{ github.ref_name }}-win64.zip"
          generate_release_notes: true
